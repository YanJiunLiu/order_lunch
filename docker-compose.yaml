version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_WATCH_USEPOLLING=true
    restart: unless-stopped
    depends_on:
      - backend

  ngrok:
    image: ngrok/ngrok:3
    restart: unless-stopped
    ports:
      - "4040:4040"
    environment:
      # 如果您有 ngrok token，可以在環境變數或這裡設定
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN:-}
    # 把前端的 5173 port 倒出去
    command: http frontend:5173
    depends_on:
      - frontend
